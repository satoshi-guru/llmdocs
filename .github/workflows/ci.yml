name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install deps
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Compile (engine + compactor + scripts + bench)
        run: python -m py_compile crawler.py minify.py scripts/*.py bench/*.py

      - name: Unit tests (deterministic compaction)
        run: python -m pytest tests/ -q

      - name: Smoke — list presets
        run: python crawler.py --list-presets

      - name: Bench recall gate (fixture store; deterministic recall+token, judge auto-skips)
        run: python bench/bench.py --libs alpha-lib --store store/example --out /tmp/bench-ci.md

      - name: Store dashboard drift gate
        run: python -m scripts.store_index --store store/example --out store/INDEX.md --check

      - name: Compaction drift gate (mechanical min tier)
        run: python crawler.py --check store/example/alpha-lib/page.md

      - name: Leak gate (must find zero hits)
        # Uses `git grep` so ONLY tracked files are scanned — never the CI working
        # tree, which holds generated artifacts (e.g. __pycache__/*.pyc embedding
        # /home/runner paths) that would false-positive. .github is excluded: this
        # workflow file defines the patterns. Fail-CLOSED: a grep tooling error
        # (exit >=2) is treated as a leak, not a pass.
        run: |
          set +e
          hits=$(git grep -nIE 'REDACTED_HOST|REDACTED_ORG|REDACTED_USER|/home/[a-z]+/|REDACTED_PROJ|REDACTED_PROJ|REDACTED_PROJ|REDACTED_PROJ|REDACTED_PROJ|REDACTED_PROJ|REDACTED_PROJ|REDACTED_PROJ|root@|ssh ' -- . ':!.github/*')
          rc=$?
          set -e
          # git grep: 0 = match found, 1 = no match (good), >=2 = real error
          if [ "$rc" -ge 2 ]; then echo "::error::leak-gate git grep errored ($rc) — treating as leak"; exit 1; fi
          if [ "$rc" -eq 0 ]; then echo "$hits"; echo "::error::leak gate found forbidden strings"; exit 1; fi
          echo "leak gate clean"
